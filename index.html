<style>
  :root {
    --bg-void: #0a0e17;
    --bg-panel: #121a2b;
    --bg-panel-2: #1a2438;
    --bg-panel-3: #202c45;
    --line: rgba(201, 168, 106, 0.22);
    --gold: #c9a86a;
    --gold-bright: #e8c886;
    --crystal: #6fd6e8;
    --crystal-dim: rgba(111, 214, 232, 0.35);
    --ink: #eae6da;
    --ink-dim: #9aa3b8;
    --ink-faint: #5f6a80;
    --font-display: 'Cinzel', 'Noto Serif JP', serif;
    --font-body: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 24px;
    background: var(--bg-void);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    min-height: 100vh;
  }

  .widget {
    position: relative;
    width: 100%;
    max-width: 420px;
    background:
      radial-gradient(120% 140% at 15% -10%, rgba(111,214,232,0.10), transparent 55%),
      linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-void) 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px 24px 20px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 20px 50px -20px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.03);
    overflow: hidden;
  }

  .widget::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, var(--crystal-dim), transparent 70%);
    filter: blur(6px);
    pointer-events: none;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
  }

  .eyebrow .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--crystal);
    box-shadow: 0 0 8px 2px var(--crystal-dim);
    animation: pulse 2.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .current-patch-badge {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--gold-bright);
    background: var(--bg-panel-3);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 4px 10px;
    white-space: nowrap;
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .current-patch-badge:hover {
    border-color: var(--gold);
    background: var(--bg-panel-2);
  }

  .today-date {
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 14px;
    letter-spacing: 0.02em;
    text-align: right;
  }

  /* Item rows */
  .rows { display: flex; flex-direction: column; gap: 8px; }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--bg-panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }

  a.row {
    cursor: pointer;
  }
  a.row:hover, a.row:active {
    border-color: var(--gold);
    background: var(--bg-panel-3);
  }

  .row-icon {
    width: 30px; height: 30px;
    flex-shrink: 0;
    border-radius: 8px;
    background: var(--bg-panel-3);
    display: flex; align-items: center; justify-content: center;
    color: var(--crystal);
    font-size: 14px;
    text-shadow: 0 0 8px var(--crystal-dim);
  }

  .row-body { flex: 1; min-width: 0; }

  .row-title {
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 500;
    white-space: normal;
    overflow-wrap: break-word;
  }

  .row-icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .ongoing-badge {
    display: inline-block;
    font-size: 8.5px;
    font-weight: 700;
    color: #201607;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border-radius: 10px;
    padding: 1px 6px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .row-category {
    font-size: 9.5px;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .row-sub {
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 2px;
    white-space: normal;
    overflow-wrap: break-word;
  }

  .row-note {
    font-size: 10.5px;
    color: var(--ink-faint);
    margin-top: 2px;
    white-space: normal;
    overflow-wrap: break-word;
  }

  .row-note-list {
    margin: 3px 0 0;
    padding-left: 14px;
    font-size: 10.5px;
    color: var(--ink-faint);
  }
  .row-note-list li {
    margin-bottom: 1px;
    overflow-wrap: break-word;
  }
  .row-note-list li::marker {
    color: var(--gold);
  }

  .row-count {
    text-align: right;
    margin-top: 5px;
  }

  .row-count .num {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--crystal);
    text-shadow: 0 0 10px var(--crystal-dim);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .row-count .num.today {
    font-size: 13px;
    color: var(--gold-bright);
    text-shadow: none;
  }

  .row-count .num-sm {
    font-size: 16px;
  }

  .row-count .unit {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
  }

  .row-count .row-prefix {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
    margin-right: 2px;
  }

  .empty-state {
    text-align: center;
    padding: 30px 10px;
    color: var(--ink-faint);
    font-size: 12.5px;
    line-height: 1.7;
  }

  .footer-note {
    margin-top: 16px;
    font-size: 10px;
    color: var(--ink-dim);
    opacity: 0.6;
    text-align: right;
    letter-spacing: 0.02em;
  }

    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    margin-bottom: 14px;
  }

  .cal-month-title {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.02em;

    color: var(--ink-dim);
    font-family: var(--font-body);
    font-weight: 500;
    margin-left: 6px;

  .cal-nav-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: border-color 0.15s, color 0.15s;
  }
  .cal-nav-btn:hover { border-color: var(--gold); color: var(--gold-bright); }

  .cal-today-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-family: var(--font-body);
    font-size: 10.5px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .cal-today-btn:hover { border-color: var(--gold); color: var(--gold-bright); }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .cal-weekdays span {
    text-align: center;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    padding-bottom: 6px;
  }
  .cal-weekdays span.sun { color: #d97a7a; }
  .cal-weekdays span.sat { color: #7aa8d9; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-cell {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    background: transparent;
    border: 1px solid transparent;
    transition: border-color 0.15s, background 0.15s;
  }
  .cal-cell.empty { visibility: hidden; }
  .cal-cell .daynum {
    font-size: 12.5px;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .cal-cell.has-event {
    cursor: pointer;
    background: var(--bg-panel-2);
    border: 1px solid var(--line);
  }
  .cal-cell.has-event .daynum { color: var(--ink); font-weight: 500; }
  .cal-cell.has-event:hover { border-color: var(--gold); }
  .cal-cell.today { border-color: var(--gold); }
  .cal-cell.today .daynum { color: var(--gold-bright); font-weight: 700; }
  .cal-cell.selected { background: var(--bg-panel-3); border-color: var(--crystal); }

  .cal-dot-row {
    display: flex;
    gap: 2px;
    margin-top: 2px;
    height: 5px;
    align-items: center;
  }

  .cal-detail-panel {
    margin-top: 16px;

    border-top: 1px dashed var(--line);
  }
  .cal-detail-date {
    font-size: 10.5px;
    letter-spacing: 0.1em;

    text-transform: uppercase;
    margin-bottom: 10px;

  .cal-detail-empty {
    font-size: 12px;
    color: var(--ink-faint);
    text-align: center;
    padding: 10px 0;

  .cal-detail-card {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--bg-panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 13px;
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;

  .cal-detail-card:last-child { margin-bottom: 0; }
  a.cal-detail-card { cursor: pointer; transition: border-color 0.15s; }
  a.cal-detail-card:hover { border-color: var(--gold); }
  .cal-detail-icon {
    width: 26px; height: 26px;
    flex-shrink: 0;
    border-radius: 7px;
    background: var(--bg-panel-3);
    display: flex; align-items: center; justify-content: center;
    color: var(--crystal);
    font-size: 12px;
    margin-top: 1px;

  .cal-detail-body { flex: 1; min-width: 0; }
  .cal-detail-category {
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 2px;

  .cal-detail-title { font-size: 12.5px; color: var(--ink); font-weight: 500; }
  .cal-detail-range { font-size: 10.5px; color: var(--ink-dim); margin-top: 2px; }

  .cal-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--ink-dim); }
  .cal-legend-item .pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Larger, more comfortable sizing on wider (desktop) screens */
  @media (min-width: 700px) {
    .widget {

    .current-patch-badge { font-size: 13px; padding: 6px 14px; }
    .today-date { font-size: 14px; }
    .row { padding: 18px 20px; gap: 16px; border-radius: 13px; }
    .row-icon { width: 38px; height: 38px; font-size: 18px; border-radius: 10px; }
    .row-category { font-size: 11.5px; }
    .row-title { font-size: 17px; }
    .row-sub { font-size: 13.5px; }
    .row-note, .row-note-list { font-size: 13px; }
    .row-count .num { font-size: 27px; }
    .row-count .num-sm { font-size: 20px; }
    .row-count .unit { font-size: 12.5px; }
    .row-count .row-prefix { font-size: 12.5px; }
    .row-count .num.today { font-size: 16px; }
    .ongoing-badge { font-size: 10.5px; padding: 2px 8px; }
    .footer-note { font-size: 12px; }
    .cal-month-title { font-size: 24px; }
    .cal-cell .daynum { font-size: 15px; }
    .cal-detail-title { font-size: 14.5px; }
    .cal-detail-range { font-size: 12px; }
  }
</style>

function daysUntil(dateStr, timeJST) {
  if (!dateStr) return null;
  const time = timeJST || '00:00:00';
  const target = new Date(dateStr + 'T' + time + '+09:00');
  const now = new Date();
  const diff = target - now;
  return Math.ceil(diff / 86400000);
}

function msUntil(dateStr, timeJST) {
  if (!dateStr) return null;
  const time = timeJST || '00:00:00';
  const target = new Date(dateStr + 'T' + time + '+09:00');
  const now = new Date();
  return target - now;
}

function nextTuesday17() {
  const now = new Date();
  // Work in JST
  const jstNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const day = jstNow.getDay(); // 0=Sun ... 2=Tue
  let daysAhead = (2 - day + 7) % 7;
  const candidate = new Date(jstNow);
  candidate.setHours(17, 0, 0, 0);
  candidate.setDate(jstNow.getDate() + daysAhead);
  if (daysAhead === 0 && jstNow.getHours() >= 17) {
    candidate.setDate(candidate.getDate() + 7);
  }
  const diff = candidate - jstNow;
  if (diff <= 0) return 0;
  return Math.ceil(diff / 86400000);
}

function nextTuesday17Ms() {
  const now = new Date();
  const jstNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const day = jstNow.getDay();
  let daysAhead = (2 - day + 7) % 7;
  const candidate = new Date(jstNow);
  candidate.setHours(17, 0, 0, 0);
  candidate.setDate(jstNow.getDate() + daysAhead);
  if (daysAhead === 0 && jstNow.getHours() >= 17) {
    candidate.setDate(candidate.getDate() + 7);
  }
  return candidate - jstNow;
}

// days: the (ceil) day count used for filtering/sorting.
// ms: the raw millisecond diff, used to render "N日N時間N分" when available.
function todayJSTStr() {
  const now = new Date();
  const jstNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const y = jstNow.getFullYear();
  const m = String(jstNow.getMonth() + 1).padStart(2, '0');
  const d = String(jstNow.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function countLabel(days, ms) {
  if (days === null) return { type: 'text', text: '未設定' };
  if (days < 0) return { type: 'text', text: '終了' };
  if (days === 0) return { type: 'text', text: '本日' };
  if (typeof ms === 'number' && ms > 0) {
    const wholeDays = Math.floor(ms / 86400000);
    const hours = Math.floor((ms % 86400000) / 3600000);
    const minutes = Math.floor((ms % 3600000) / 60000);
    return { type: 'dhm', days: wholeDays, hours, minutes };
  }
  return { type: 'simple', value: days, unit: '日' };
}

function updateTodayDate() {
  const el = document.getElementById('todayDate');
  if (!el) return;
  const now = new Date();
  const jstNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const y = jstNow.getFullYear();
  const m = jstNow.getMonth() + 1;
  const d = jstNow.getDate();
  const w = weekdays[jstNow.getDay()];
  el.textContent = `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}（${w}）`;
}

function renderRows() {
  const container = document.getElementById('rows');
  container.innerHTML = '';

  const badge = document.getElementById('currentPatchBadge');
  if (badge) {
    badge.textContent = config.patch && config.patch.curPatch ? ('Patch ' + config.patch.curPatch) : '';
  }

  const enabledItems = ITEM_ORDER.filter(key => config[key].enabled);

  if (enabledItems.length === 0) {
    container.innerHTML = '<div class="empty-state">表示する項目がありません<br>⚙ から項目を選んでください</div>';
    return;
  }

  const rowsData = enabledItems
    .map(key => {
      const meta = ITEM_META[key];
      const item = config[key];
      let title, dateText, note, days, ms, prefix = 'あと', categoryLabel = null, ongoing = false;

      if (key === 'patch') {
        title = 'パッチ' + item.nextPatch;
        dateText = fmtDate(item.nextDate);
        note = item.nextNote || ('現在 ' + item.curPatch + '「' + item.curName + '」');
        days = daysUntil(item.nextDate);
        ms = msUntil(item.nextDate);
      } else if (key === 'reset') {
        title = '週制限のリセット';
        dateText = '毎週火曜 17:00 (JST)';
        note = null;
        days = nextTuesday17();
        ms = nextTuesday17Ms();
      } else {
        title = item.title || meta.label;
        if (item.startDate && item.date) {
          dateText = fmtDate(item.startDate) + ' 〜 ' + fmtDate(item.date);
          const today = todayJSTStr();
          if (today >= item.startDate && today <= item.date) {
            // Currently within the event's date range: keep counting down to the end date.
            ongoing = true;
            prefix = '終了まであと';
            days = daysUntil(item.date);
            ms = msUntil(item.date);
          } else {
            days = daysUntil(item.startDate);
            ms = msUntil(item.startDate);
          }
        } else {
          dateText = item.date ? fmtDate(item.date) : '日付未設定';
          days = daysUntil(item.date);
          ms = msUntil(item.date);
        }
        note = item.note || null;
        if (key === 'seasonal') {
          prefix = 'あと';
        }
      }

      categoryLabel = CATEGORY_LABELS[key] || null;
      const categoryColor = CATEGORY_COLORS[key] || null;
      // Whether the row should disappear is always based on the true end date.
      const filterDays = (key === 'patch' || key === 'reset') ? days : daysUntil(item.date);
      const url = item.url || null;

      return { key, meta, title, dateText, note, days, ms, filterDays, prefix, categoryLabel, categoryColor, url, ongoing };
    })
    // Drop items with no date set, and items whose (end) date has already passed.
    .filter(({ filterDays }) => filterDays !== null && filterDays !== undefined && filterDays >= 0);

  if (rowsData.length === 0) {
    container.innerHTML = '<div class="empty-state">表示する項目がありません<br>⚙ から項目を選んでください</div>';
    return;
  }

  // Sort: upcoming items soonest-first at top; items with no date set go last.
  rowsData.sort((a, b) => {
    if (a.days === null && b.days === null) return 0;
    if (a.days === null) return 1;
    if (b.days === null) return -1;
    return a.days - b.days;
  });

  rowsData.forEach(({ meta, title, dateText, note, days, ms, prefix, categoryLabel, categoryColor, url, ongoing }) => {
    const cl = countLabel(days, ms);
    const row = document.createElement(url ? 'a' : 'div');
    row.className = 'row';
    if (url) {
      row.href = url;
      row.target = '_blank';
      row.rel = 'noopener noreferrer';
    }
    if (categoryColor) {
      row.style.borderLeft = `3px solid ${categoryColor}`;
      row.style.paddingLeft = '11px';
    }

    let noteHtml = '';
    if (note) {
      if (Array.isArray(note)) {
        noteHtml = '<ul class="row-note-list">' + note.map(n => `<li>${escapeHtml(n)}</li>`).join('') + '</ul>';
      } else {
        noteHtml = `<div class="row-note">${escapeHtml(note)}</div>`;
      }
    }

    const prefixHtml = cl.type !== 'text' ? `<span class="row-prefix">${prefix}</span>` : '';

    let countHtml = '';
    if (cl.type === 'text') {
      countHtml = `<div class="num today">${escapeHtml(cl.text)}</div>`;
    } else if (cl.type === 'dhm') {
      let dayColor = '';
      if (cl.days === 0) dayColor = 'color:#e05c5c; text-shadow: 0 0 10px rgba(224,92,92,0.4);';
      else if (cl.days === 1) dayColor = 'color:#e0c85c; text-shadow: 0 0 10px rgba(224,200,92,0.4);';
      countHtml = `
        <div style="display:flex; align-items:baseline; gap:2px; justify-content:flex-end; flex-wrap:wrap;">
          ${prefixHtml}
          <span class="num num-sm" style="${dayColor}">${cl.days}</span><span class="unit">日</span>
          <span class="num num-sm" style="margin-left:3px;${dayColor}">${cl.hours}</span><span class="unit">時間</span>
          <span class="num num-sm" style="margin-left:3px;${dayColor}">${cl.minutes}</span><span class="unit">分</span>
        </div>`;
    } else {
      let valColor = '';
      if (cl.value === 0) valColor = 'color:#e05c5c; text-shadow: 0 0 10px rgba(224,92,92,0.4);';
      else if (cl.value === 1) valColor = 'color:#e0c85c; text-shadow: 0 0 10px rgba(224,200,92,0.4);';
      countHtml = `
        <div style="display:flex; align-items:baseline; gap:2px; justify-content:flex-end;">
          ${prefixHtml}
          <span class="num" style="${valColor}">${cl.value}</span><span class="unit">${cl.unit}</span>
        </div>`;
    }

    row.innerHTML = `
      <div class="row-icon-wrap">
        <div class="row-icon">${meta.icon}</div>
        ${ongoing ? '<span class="ongoing-badge">開催中</span>' : ''}
      </div>
      <div class="row-body">
        ${categoryLabel ? `<div class="row-category" style="${categoryColor ? `color:${categoryColor};` : ''}">${escapeHtml(categoryLabel)}</div>` : ''}
        <div class="row-title">${escapeHtml(title)}</div>
        <div class="row-sub">${escapeHtml(dateText)}</div>
        ${noteHtml}
        <div class="row-count">
          ${countHtml}
        </div>
      </div>
    `;
    container.appendChild(row);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function initWidget() {
  config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  renderRows();
  updateTodayDate();
}

initWidget();
setInterval(() => { renderRows(); updateTodayDate(); }, 60000);

/* ============ Calendar (shares the same DEFAULT_CONFIG data) ============ */

function buildCalendarEvents() {
  const events = [];

  // patch (next patch)
  events.push({
    icon: ITEM_META.patch.icon,
    category: CATEGORY_LABELS.patch,
    color: CATEGORY_COLORS.patch,
    title: 'パッチ' + DEFAULT_CONFIG.patch.nextPatch,
    start: DEFAULT_CONFIG.patch.nextDate,
    end: DEFAULT_CONFIG.patch.nextDate,
    url: DEFAULT_CONFIG.patch.url || null
  });

  // patch2
  if (DEFAULT_CONFIG.patch2 && DEFAULT_CONFIG.patch2.date) {
    events.push({
      icon: ITEM_META.patch2.icon,
      category: CATEGORY_LABELS.patch2,
      color: CATEGORY_COLORS.patch2,
      title: DEFAULT_CONFIG.patch2.title,
      start: DEFAULT_CONFIG.patch2.date,
      end: DEFAULT_CONFIG.patch2.date,
      url: DEFAULT_CONFIG.patch2.url || null
    });
  }

  // generic date-based items
  ['pll', 'mogcolle', 'seasonal', 'fanfest_anaheim', 'fanfest_berlin', 'fanfest_tokyo'].forEach(key => {
    const item = DEFAULT_CONFIG[key];
    if (!item || !item.enabled) return;
    const start = item.startDate || item.date;
    const end = item.date;
    if (!start || !end) return;
    events.push({
      icon: ITEM_META[key].icon,
      category: CATEGORY_LABELS[key],
      color: CATEGORY_COLORS[key],
      title: item.title,
      start,
      end,
      url: item.url || null
    });
  });

  return events;
}

const CAL_EVENTS = buildCalendarEvents();

function calTodayJST() {
  const now = new Date();
  const j = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  return { y: j.getFullYear(), m: j.getMonth(), d: j.getDate(), str: `${j.getFullYear()}-${String(j.getMonth()+1).padStart(2,'0')}-${String(j.getDate()).padStart(2,'0')}` };
}

const calToday = calTodayJST();
let calViewYear = calToday.y;
let calViewMonth = calToday.m;
let calSelectedDateStr = calToday.str;

function calDateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function calEventsOnDate(ds) {
  return CAL_EVENTS.filter(e => ds >= e.start && ds <= e.end);
}

function calFmtDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${y}/${m}/${d}`;
}

function renderCalGrid() {
  document.getElementById('calMonthTitle').innerHTML =
    `${calViewMonth + 1}月<span class="yr">${calViewYear}</span>`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty';
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = calDateStr(calViewYear, calViewMonth, d);
    const evs = calEventsOnDate(ds);
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (evs.length > 0) cell.classList.add('has-event');
    if (ds === calToday.str) cell.classList.add('today');
    if (ds === calSelectedDateStr) cell.classList.add('selected');

    let dotsHtml = '';
    if (evs.length > 0) {
      dotsHtml = '<div class="cal-dot-row">' +
        evs.slice(0, 4).map(e => `<span class="pip" style="background:${e.color}"></span>`).join('') +
        '</div>';
    }

    cell.innerHTML = `<span class="daynum">${d}</span>${dotsHtml}`;
    cell.addEventListener('click', () => {
      calSelectedDateStr = ds;
      renderCalGrid();
      renderCalDetail();
    });
    grid.appendChild(cell);
  }
}

function renderCalDetail() {
  const evs = calEventsOnDate(calSelectedDateStr);
  document.getElementById('calDetailDate').textContent =
    calFmtDate(calSelectedDateStr) + (calSelectedDateStr === calToday.str ? '（本日）' : '');

  const content = document.getElementById('calDetailContent');
  if (evs.length === 0) {
    content.innerHTML = '<div class="cal-detail-empty">この日の予定はありません</div>';
    return;
  }

  content.innerHTML = evs.map(e => {
    const rangeText = e.start === e.end ? calFmtDate(e.start) : `${calFmtDate(e.start)} 〜 ${calFmtDate(e.end)}`;
    const tag = e.start !== e.end ? '<span style="margin-left:6px;">開催中</span>' : '';
    const inner = `
      <div class="cal-detail-icon" style="color:${e.color}">${e.icon}</div>
      <div class="cal-detail-body">
        <div class="cal-detail-category" style="color:${e.color}">${escapeHtml(e.category)}</div>
        <div class="cal-detail-title">${escapeHtml(e.title)}</div>
        <div class="cal-detail-range">${escapeHtml(rangeText)}${tag}</div>
      </div>
    `;
    if (e.url) {
      return `<a class="cal-detail-card" href="${e.url}" target="_blank" rel="noopener noreferrer">${inner}</a>`;
    }
    return `<div class="cal-detail-card">${inner}</div>`;
  }).join('');
}

function renderCalLegend() {
  const seen = new Map();
  CAL_EVENTS.forEach(e => { if (!seen.has(e.category)) seen.set(e.category, e.color); });
  const legend = document.getElementById('calLegend');
  legend.innerHTML = Array.from(seen.entries()).map(([cat, color]) =>
    `<div class="cal-legend-item"><span class="pip" style="background:${color}"></span>${escapeHtml(cat)}</div>`
  ).join('');
}

document.getElementById('calPrevBtn').addEventListener('click', () => {
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  renderCalGrid();
});
document.getElementById('calNextBtn').addEventListener('click', () => {
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderCalGrid();
});
document.getElementById('calTodayBtn').addEventListener('click', () => {
  calViewYear = calToday.y;
  calViewMonth = calToday.m;
  calSelectedDateStr = calToday.str;
  renderCalGrid();
  renderCalDetail();
});

renderCalGrid();
renderCalDetail();
renderCalLegend();
</script>
